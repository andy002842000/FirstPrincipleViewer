<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Select region</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        cursor: crosshair;
        background: rgba(15, 17, 21, 0.25);
        user-select: none;
      }
      #hint {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        font: 13px/1.4 system-ui, -apple-system, "Segoe UI", sans-serif;
        color: #e7eaf0;
        background: rgba(15, 17, 21, 0.8);
        padding: 8px 14px;
        border-radius: 8px;
        pointer-events: none;
        white-space: nowrap;
      }
      #selection {
        position: fixed;
        border: 1.5px solid #5b9dff;
        background: rgba(91, 157, 255, 0.12);
        box-shadow: 0 0 0 9999px rgba(15, 17, 21, 0.45);
        display: none;
        pointer-events: none;
      }
      #size {
        position: absolute;
        bottom: -22px;
        left: 0;
        font: 12px/1 system-ui, sans-serif;
        color: #e7eaf0;
        background: rgba(15, 17, 21, 0.85);
        padding: 3px 6px;
        border-radius: 4px;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div id="hint"></div>
    <div id="selection"><span id="size"></span></div>
    <script type="module" src="/src/overlay.ts"></script>
  </body>
</html>
